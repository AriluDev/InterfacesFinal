<div class="container mt-4">
  <h2 class="fw-bold mb-4">
    <i class="bi bi-book-fill me-2 text-info"></i>Cursos Disponibles
  </h2>

  <div class="text-center p-4" *ngIf="cargando">
    <div class="spinner-border text-info"></div>
  </div>

  <div class="row g-4" *ngIf="!cargando">
    <div class="col-md-4" *ngFor="let c of cursos">
      <div class="card border-0 shadow-sm h-100" [appHighlight]="'#e8f8ff'">
        <div class="card-header bg-info text-white">
          <h6 class="mb-0 fw-bold">
            <i class="bi bi-book me-2"></i>{{ c.nombre }}
          </h6>
        </div>
        <div class="card-body">
          <p class="text-muted mb-2">{{ c.descripcion }}</p>
          <p class="mb-1">
            <i class="bi bi-person me-1 text-info"></i>
            <strong>Profesor:</strong> {{ c.profesor }}
          </p>
          <p class="mb-0">
            <i class="bi bi-star me-1 text-warning"></i>
            <strong>Créditos:</strong> {{ c.creditos }}
          </p>
        </div>
        <div class="card-footer bg-white">
          <span class="badge bg-success">
            <i class="bi bi-check-circle me-1"></i>{{ c.estado }}
          </span>
        </div>
      </div>
    </div>
  </div>

  <div class="alert alert-info mt-3" *ngIf="!cargando && cursos.length === 0">
    <i class="bi bi-info-circle me-2"></i>No hay cursos activos disponibles.
  </div>
</div>
