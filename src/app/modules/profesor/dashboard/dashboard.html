<div class="container mt-4">
  <div class="row mb-4">
    <div class="col">
      <h2 class="fw-bold">
        <i class="bi bi-speedometer2 me-2 text-success"></i>
        Bienvenido, {{ usuario?.nombre }} 👨‍🏫
      </h2>
      <p class="text-muted">Panel del Profesor</p>
    </div>
  </div>

  <div class="row g-4 mb-4">
    <div class="col-md-4">
      <div class="card border-0 shadow-sm bg-success text-white">
        <div class="card-body d-flex align-items-center gap-3 p-4">
          <i class="bi bi-book-fill" style="font-size: 2.5rem;"></i>
          <div>
            <h3 class="fw-bold mb-0">{{ totalCursos }}</h3>
            <span>Mis cursos</span>
          </div>
        </div>
      </div>
    </div>
  </div>

  <div class="row g-3">
    <div class="col-md-6">
      <div class="card border-0 shadow-sm">
        <div class="card-body p-4">
          <h5 class="fw-bold mb-3"><i class="bi bi-book me-2 text-success"></i>Mis Cursos</h5>
          <p class="text-muted">Gestiona y edita tus cursos asignados.</p>
          <a routerLink="/profesor/mis-cursos" class="btn btn-success">
            <i class="bi bi-arrow-right me-1"></i>Ver Mis Cursos
          </a>
        </div>
      </div>
    </div>
  </div>
</div>
